services:
  - type: web
    name: intellcode-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GITHUB_CLIENT_ID
        sync: false        # set manually in Render dashboard
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: GITHUB_WEBHOOK_SECRET
        sync: false
      - key: FRONTEND_URL
        value: https://safaapatel.github.io/intellcode
    plan: starter          # free tier doesn't have enough RAM for PyTorch
