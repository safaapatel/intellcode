name: IntelliCode PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "**.py"
      - "**.js"
      - "**.ts"
      - "**.jsx"
      - "**.tsx"
      - "**.java"

permissions:
  contents: read
  pull-requests: write    # post review comments
  checks: write           # post Check Run (required for Checks API)
  security-events: write  # upload SARIF to Code Scanning

jobs:
  intellicode-review:
    name: IntelliCode Code Quality Review
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout the full PR HEAD (so we can read changed files)
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0        # needed for cross-project diff

      # -----------------------------------------------------------------------
      # 2. Set up Python
      # -----------------------------------------------------------------------
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      # -----------------------------------------------------------------------
      # 3. Install IntelliCode dependencies
      #    CPU-only torch keeps the image small and fast.
      #    The security CNN falls back to RF-only when torch is unavailable.
      # -----------------------------------------------------------------------
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r backend/requirements.txt

      # -----------------------------------------------------------------------
      # 4. Check model checkpoints
      # -----------------------------------------------------------------------
      - name: Check model checkpoints
        run: |
          python - <<'EOF'
          from pathlib import Path
          checkpoints = [
            "backend/checkpoints/complexity/model.pkl",
            "backend/checkpoints/security/rf_model.pkl",
            "backend/checkpoints/bug_predictor/xgb_model.pkl",
            "backend/checkpoints/pattern/rf_model.pkl",
          ]
          missing = [c for c in checkpoints if not Path(c).exists()]
          if missing:
            print("[warn] Missing checkpoints:", missing)
            print("[warn] Models will use rule-based fallbacks for missing checkpoints.")
          else:
            print("[ok] All checkpoints present.")
          EOF

      # -----------------------------------------------------------------------
      # 5. Run IntelliCode analysis and post PR review
      # -----------------------------------------------------------------------
      - name: Run IntelliCode review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INTELLICODE_THRESHOLD: ${{ vars.INTELLICODE_THRESHOLD || '60' }}
          INTELLICODE_FAIL_ON_ISSUES: ${{ vars.INTELLICODE_FAIL_ON_ISSUES || 'false' }}
        run: |
          cd /
          python $GITHUB_WORKSPACE/backend/github_action_review.py

      # -----------------------------------------------------------------------
      # 6. Upload SARIF to GitHub Code Scanning (Security tab)
      #    Findings appear as Code Scanning alerts on the PR and in the repo
      #    Security tab. Dismissed alerts are remembered across PRs.
      # -----------------------------------------------------------------------
      - name: Upload SARIF to Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: backend/evaluation/results/intellicode.sarif.json
          category: intellicode
        continue-on-error: true   # don't fail if SARIF is missing (no findings)

      # -----------------------------------------------------------------------
      # 7. Upload full analysis JSON as workflow artifact (for debugging)
      # -----------------------------------------------------------------------
      - name: Save analysis results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: intellicode-results-${{ github.event.pull_request.number }}
          path: |
            backend/evaluation/results/
          retention-days: 30
          if-no-files-found: ignore
